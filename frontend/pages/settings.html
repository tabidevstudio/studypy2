<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings | Studypy</title>
    <meta name="description" content="App settings for StudyPy." />
    <link rel="stylesheet" href="../css/main.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap">
    <link rel="icon" type="image/png" href="../assets/favicon/favicon-96x96.png" sizes="96x96" />
</head>
<body>

    <div id="navbar-placeholder"></div>

    <div class="settings-container">
        <div class="settings-layout" style="display:flex; align-items:center; justify-content:center; min-height:60vh;">
            <div class="dashboard-card" style="text-align:center; max-width:480px; width:100%;">
                <i class='bx bx-cog' style="font-size:3rem; color:rgb(145,218,235); margin-bottom:16px; display:block;"></i>
                <h2 style="font-size:1.4rem; font-weight:700; margin-bottom:10px;">Settings</h2>
                <p style="color:rgba(255,255,255,0.55); font-size:0.92rem; line-height:1.6; margin-bottom:24px;">
                    This area is reserved for app-wide settings. More options are coming soon — stay tuned!
                </p>
                <a href="/pages/profile.html" style="display:inline-flex; align-items:center; gap:8px; background:rgba(145,218,235,0.12); color:rgb(145,218,235); border:1px solid rgba(145,218,235,0.25); padding:10px 24px; border-radius:8px; font-family:'Poppins',sans-serif; font-weight:600; text-decoration:none; transition:all 0.2s;" onmouseover="this.style.background='rgba(145,218,235,0.22)'" onmouseout="this.style.background='rgba(145,218,235,0.12)'">
                    <i class='bx bx-user-circle'></i>
                    Go to My Profile
                </a>
            </div>
        </div>
    </div>

    <script type="module" src="../js/script.js"></script>
</body>
</html>
