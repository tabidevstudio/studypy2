<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile & Settings | Studypy</title>
    <link rel="stylesheet" href="../css/main.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap">
    <link rel="icon" type="image/png" href="../assets/favicon/favicon-96x96.png" sizes="96x96" />
</head>
<body>

    <div id="navbar-placeholder"></div>

    <div class="settings-container">
        <div class="settings-layout">
            
            <!-- SIDEBAR DETAILS -->
            <div class="left-column">
                <!-- Profile details -->
                <div class="dashboard-card profile-header">
                    <img src="/assets/images/lugu-bg.png" alt="Avatar" id="user-avatar" class="profile-avatar">
                    <h2 id="user-name" class="profile-name">...</h2>
                    <p id="user-email" class="profile-email">...</p>
                    <button id="logout-btn" class="btn-logout">
                        <i class='bx bx-log-out'></i>
                        Sign Out
                    </button>
                </div>

                <!-- Daily Streak flame -->
                <div class="dashboard-card streak-card">
                    <div class="streak-flame">🔥</div>
                    <div class="streak-count" id="streak-count">0</div>
                    <div class="streak-title">Days Streak</div>
                    <div id="streak-status" class="streak-status">...</div>
                </div>
            </div>

            <!-- MAIN WORKSPACE -->
            <div class="right-column">
                <!-- Daily challenge panel -->
                <div class="dashboard-card">
                    <h2 class="card-title">
                        <i class='bx bx-code-block'></i>
                        Daily Coding Challenge
                    </h2>
                    <div class="challenge-box">
                        <div class="challenge-title" id="challenge-title">...</div>
                        <p class="challenge-desc" id="challenge-desc">...</p>
                        <textarea id="challenge-code" class="code-textarea" spellcheck="false"></textarea>
                        <button id="verify-challenge-btn" class="btn-verify">Run & Verify Challenge</button>
                        <div id="verify-result" class="verify-result"></div>
                    </div>
                </div>

                <!-- Bookmarked Resource Links -->
                <div class="dashboard-card">
                    <h2 class="card-title">
                        <i class='bx bx-bookmark'></i>
                        Bookmarked Resources
                    </h2>
                    <div id="bookmarks-list" class="list-container">
                        <!-- Bookmarks loaded dynamically -->
                        <div class="empty-placeholder">No bookmarks saved yet.</div>
                    </div>
                </div>

                <!-- Watched video tutorials progress -->
                <div class="dashboard-card">
                    <h2 class="card-title">
                        <i class='bx bx-video'></i>
                        Watched Video Tutorials
                    </h2>
                    <div id="watched-list" class="list-container">
                        <!-- Watched videos loaded dynamically -->
                        <div class="empty-placeholder">No videos completed yet.</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="../js/script.js"></script>
    <script type="module">
        import { getProfile, logoutUser, toggleBookmark, toggleWatched } from "../js/auth.js";

        // Global user object and challenges list
        let currentUser = null;

        const CHALLENGES = {
            1: { // Monday
                title: "Odd or Even (Python)",
                desc: "Write a function <code>is_even(n)</code> that returns <code>True</code> if an integer <code>n</code> is even, and <code>False</code> if it is odd.",
                template: "def is_even(n):\n    # Write your code here\n    return False\n",
                assertions: "\n# Test cases\nassert is_even(4) == True, 'Failed for n=4'\nassert is_even(7) == False, 'Failed for n=7'\nassert is_even(0) == True, 'Failed for n=0'\nprint('All tests passed!')\n"
            },
            2: { // Tuesday
                title: "Reverse a String (Python)",
                desc: "Write a function <code>reverse_str(s)</code> that returns the reversed version of string <code>s</code>.",
                template: "def reverse_str(s):\n    # Write your code here\n    return s\n",
                assertions: "\n# Test cases\nassert reverse_str('hello') == 'olleh', \"Failed for 'hello'\"\nassert reverse_str('') == '', 'Failed for empty string'\nassert reverse_str('Py') == 'yP', \"Failed for 'Py'\"\nprint('All tests passed!')\n"
            },
            3: { // Wednesday
                title: "Sum of a List (Python)",
                desc: "Write a function <code>sum_list(arr)</code> that returns the sum of all elements in list <code>arr</code>. Return 0 if the list is empty.",
                template: "def sum_list(arr):\n    # Write your code here\n    return 0\n",
                assertions: "\n# Test cases\nassert sum_list([1, 2, 3]) == 6, 'Failed for [1, 2, 3]'\nassert sum_list([]) == 0, 'Failed for empty list'\nassert sum_list([-1, 5]) == 4, 'Failed for list with negative number'\nprint('All tests passed!')\n"
            },
            4: { // Thursday
                title: "Find Maximum in List (Python)",
                desc: "Write a function <code>find_max(arr)</code> that returns the largest number in the list. Assume list has at least one item.",
                template: "def find_max(arr):\n    # Write your code here\n    return arr[0]\n",
                assertions: "\n# Test cases\nassert find_max([3, 1, 4, 1, 5]) == 5, 'Failed for [3, 1, 4, 1, 5]'\nassert find_max([-10, -5, -20]) == -5, 'Failed for list of negative numbers'\nprint('All tests passed!')\n"
            },
            5: { // Friday
                title: "FizzBuzz (Python)",
                desc: "Write a function <code>fizzbuzz(n)</code> that returns <code>'Fizz'</code> if divisible by 3, <code>'Buzz'</code> if divisible by 5, <code>'FizzBuzz'</code> if divisible by both 3 and 5, and the string representation of <code>n</code> otherwise.",
                template: "def fizzbuzz(n):\n    # Write your code here\n    return str(n)\n",
                assertions: "\n# Test cases\nassert fizzbuzz(3) == 'Fizz', 'Failed for n=3'\nassert fizzbuzz(5) == 'Buzz', 'Failed for n=5'\nassert fizzbuzz(15) == 'FizzBuzz', 'Failed for n=15'\nassert fizzbuzz(7) == '7', 'Failed for n=7'\nprint('All tests passed!')\n"
            },
            6: { // Saturday
                title: "Palindrome Checker (Python)",
                desc: "Write a function <code>is_palindrome(s)</code> that returns <code>True</code> if string <code>s</code> is a palindrome (reads the same forward and backward), and <code>False</code> otherwise.",
                template: "def is_palindrome(s):\n    # Write your code here\n    return False\n",
                assertions: "\n# Test cases\nassert is_palindrome('racecar') == True, \"Failed for 'racecar'\"\nassert is_palindrome('hello') == False, \"Failed for 'hello'\"\nassert is_palindrome('a') == True, \"Failed for 'a'\"\nprint('All tests passed!')\n"
            },
            0: { // Sunday
                title: "Factorial (Python)",
                desc: "Write a function <code>factorial(n)</code> that returns the factorial of integer <code>n</code> (where n >= 0). Note that 0! = 1.",
                template: "def factorial(n):\n    # Write your code here\n    return 1\n",
                assertions: "\n# Test cases\nassert factorial(5) == 120, 'Failed for n=5'\nassert factorial(0) == 1, 'Failed for n=0'\nassert factorial(3) == 6, 'Failed for n=3'\nprint('All tests passed!')\n"
            }
        };

        async function initDashboard() {
            const profileRes = await getProfile();
            
            if (!profileRes.authenticated) {
                // Not authenticated, redirect to login page
                window.location.href = "/pages/login.html";
                return;
            }

            currentUser = profileRes.user;
            renderProfile();
            renderStreak();
            renderChallenge();
            renderBookmarks();
            renderWatchedVideos();
        }

        function renderProfile() {
            document.getElementById("user-avatar").src = currentUser.avatar || "/assets/images/lugu-bg.png";
            document.getElementById("user-name").textContent = currentUser.username;
            document.getElementById("user-email").textContent = currentUser.email;
        }

        function renderStreak() {
            const streak = currentUser.streak || { count: 0, lastActiveDate: "" };
            document.getElementById("streak-count").textContent = streak.count;

            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, "0");
            const date = String(d.getDate()).padStart(2, "0");
            const todayStr = `${year}-${month}-${date}`;

            const streakStatusBox = document.getElementById("streak-status");
            if (streak.lastActiveDate === todayStr) {
                streakStatusBox.className = "streak-status";
                streakStatusBox.innerHTML = "<i class='bx bx-check-double'></i> Streak is Active for Today!";
            } else {
                streakStatusBox.className = "streak-status inactive";
                streakStatusBox.innerHTML = "<i class='bx bx-time'></i> Complete today's challenge to maintain your streak!";
            }
        }

        function renderChallenge() {
            // Get day of week (0-6)
            const day = new Date().getDay();
            const challenge = CHALLENGES[day];

            document.getElementById("challenge-title").textContent = challenge.title;
            document.getElementById("challenge-desc").innerHTML = challenge.desc;

            // Check if already completed today
            const streak = currentUser.streak || { count: 0, lastActiveDate: "" };
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, "0");
            const date = String(d.getDate()).padStart(2, "0");
            const todayStr = `${year}-${month}-${date}`;

            const verifyResult = document.getElementById("verify-result");
            const verifyBtn = document.getElementById("verify-challenge-btn");
            const codeArea = document.getElementById("challenge-code");

            if (streak.lastActiveDate === todayStr) {
                codeArea.value = `# Today's challenge is already completed!\n# Current streak is locked for today.`;
                codeArea.disabled = true;
                verifyBtn.disabled = true;
                verifyBtn.style.opacity = 0.5;
                verifyResult.style.display = "block";
                verifyResult.className = "verify-result success";
                verifyResult.innerHTML = "<i class='bx bxs-check-circle'></i> Challenge Completed! Come back tomorrow for a new one.";
            } else {
                codeArea.value = challenge.template;
                codeArea.disabled = false;
                verifyBtn.disabled = false;
                verifyBtn.style.opacity = 1;
                verifyResult.style.display = "none";
            }
        }

        async function verifyChallenge() {
            const day = new Date().getDay();
            const challenge = CHALLENGES[day];
            const userCode = document.getElementById("challenge-code").value;

            const verifyResult = document.getElementById("verify-result");
            verifyResult.style.display = "block";
            verifyResult.className = "verify-result";
            verifyResult.innerHTML = "<i class='bx bx-loader-alt bx-spin'></i> Running test cases...";

            const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
            const BACKEND_BASE = isLocal
                ? "http://localhost:3000"
                : "";

            try {
                const completeCode = userCode + challenge.assertions;
                const response = await fetch(`${BACKEND_BASE}/run`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        language: "python3",
                        code: completeCode
                    })
                });

                if (!response.ok) {
                    throw new Error("Compiler API failed. Please try again.");
                }

                const result = await response.json();

                if (result.errors) {
                    verifyResult.className = "verify-result error";
                    verifyResult.innerHTML = `<strong>Error:</strong><pre style="margin-top:5px; font-family:monospace; font-size:0.75rem;">${result.errors}</pre>`;
                } else if (result.output && result.output.includes("All tests passed!")) {
                    // Challenge verified successfully! Call backend to update streak
                    verifyResult.className = "verify-result success";
                    verifyResult.innerHTML = "<i class='bx bxs-check-circle'></i> <strong>Success!</strong> All assertions passed! Updating streak...";

                    const d = new Date();
                    const year = d.getFullYear();
                    const month = String(d.getMonth() + 1).padStart(2, "0");
                    const date = String(d.getDate()).padStart(2, "0");
                    const todayStr = `${year}-${month}-${date}`;

                    const streakRes = await fetch(`${BACKEND_BASE}/api/auth/streak/increment`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ date: todayStr }),
                        credentials: "include" // ensure session cookie is sent
                    });

                    if (streakRes.ok) {
                        const streakData = await streakRes.json();
                        currentUser.streak = streakData.streak;
                        // Refresh streak counts & challenge layout
                        renderStreak();
                        renderChallenge();
                    } else {
                        verifyResult.innerHTML = "<i class='bx bxs-check-circle'></i> <strong>Success!</strong> Code passed, but failed to contact the database for streak updating.";
                    }
                } else {
                    // Standard compiler output without assertion success (should not happen if they run correctly)
                    verifyResult.className = "verify-result error";
                    verifyResult.innerHTML = `<strong>Result:</strong> Output did not verify assertions.<pre style="margin-top:5px; font-family:monospace; font-size:0.75rem;">${result.output || "No output returned."}</pre>`;
                }
            } catch (err) {
                verifyResult.className = "verify-result error";
                verifyResult.innerHTML = `<strong>Failed to compile:</strong> ${err.message}`;
            }
        }

        function renderBookmarks() {
            const container = document.getElementById("bookmarks-list");
            const bookmarks = currentUser.bookmarks || [];

            if (bookmarks.length === 0) {
                container.innerHTML = `
                    <div class="empty-placeholder">
                        No bookmarks saved yet. Explore our <a href="/pages/Learning/online-courses.html">Online Courses</a> or <a href="/pages/Docs/official-docs.html">Cheat Sheets</a> to save resources!
                    </div>`;
                return;
            }

            container.innerHTML = "";
            bookmarks.forEach(urlPath => {
                // Extract a readable title from the URL
                let cleanTitle = urlPath;
                try {
                    const url = new URL(urlPath, window.location.origin);
                    const pathParts = url.pathname.split("/").filter(Boolean);
                    if (pathParts.length > 0) {
                        const lastPart = pathParts[pathParts.length - 1].replace(".html", "");
                        cleanTitle = lastPart.split("-").map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(" ");
                    }
                } catch(e) {}

                const card = document.createElement("div");
                card.className = "resource-card";
                card.innerHTML = `
                    <div class="resource-info">
                        <h3>${cleanTitle}</h3>
                        <p>${urlPath}</p>
                    </div>
                    <div class="resource-actions">
                        <a href="${urlPath}" class="btn-go" title="Visit Resource">
                            <i class='bx bx-right-top-arrow-circle'></i>
                        </a>
                        <button class="btn-remove remove-bookmark" data-path="${urlPath}" title="Delete Bookmark">
                            <i class='bx bx-trash'></i>
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });

            // Bind delete event listeners
            container.querySelectorAll(".remove-bookmark").forEach(btn => {
                btn.addEventListener("click", async (e) => {
                    const path = btn.dataset.path;
                    const res = await toggleBookmark(path);
                    currentUser.bookmarks = res.bookmarks;
                    renderBookmarks();
                });
            });
        }

        function renderWatchedVideos() {
            const container = document.getElementById("watched-list");
            const videos = currentUser.watchedVideos || [];

            if (videos.length === 0) {
                container.innerHTML = `
                    <div class="empty-placeholder">
                        No videos marked as watched yet. Start learning in <a href="/pages/Learning/video-tutorials.html">Video Tutorials</a>!
                    </div>`;
                return;
            }

            container.innerHTML = "";
            videos.forEach(videoUrl => {
                // Extract video title if possible or render videoUrl
                let videoTitle = "Video Tutorial";
                if (videoUrl.includes("youtube.com") || videoUrl.includes("youtu.be")) {
                    videoTitle = "YouTube Lecture / Tutorial";
                }

                const card = document.createElement("div");
                card.className = "resource-card";
                card.innerHTML = `
                    <div class="resource-info">
                        <h3>${videoTitle}</h3>
                        <p>${videoUrl}</p>
                    </div>
                    <div class="resource-actions">
                        <a href="${videoUrl}" target="_blank" class="btn-go" title="Play Video">
                            <i class='bx bx-play-circle'></i>
                        </a>
                        <button class="btn-remove remove-watched" data-url="${videoUrl}" title="Remove Progress">
                            <i class='bx bx-trash'></i>
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });

            // Bind delete event listeners
            container.querySelectorAll(".remove-watched").forEach(btn => {
                btn.addEventListener("click", async (e) => {
                    const url = btn.dataset.url;
                    const res = await toggleWatched(url);
                    currentUser.watchedVideos = res.watchedVideos;
                    renderWatchedVideos();
                });
            });
        }

        // Event listeners
        document.getElementById("logout-btn").addEventListener("click", async () => {
            await logoutUser();
            window.location.href = "/pages/login.html";
        });

        document.getElementById("verify-challenge-btn").addEventListener("click", verifyChallenge);

        // Run dashboard initializer
        initDashboard().catch(err => {
            console.error("Dashboard failed to initialize:", err);
            window.location.href = "/pages/login.html";
        });
    </script>
</body>
</html>
