<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fun Tools | Studypy</title>
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="../../css/dev-tools.css" />
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap">
  <link rel="icon" type="image/png" href="../../assets/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="../../assets/favicon/favicon.svg" />
  <link rel="shortcut icon" href="../../assets/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="../../assets/favicon/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="StudyPY" />
  <link rel="manifest" href="../../assets/favicon/site.webmanifest" />
</head>
<body>
  <div id="navbar-placeholder"></div>
  <main class="main">
    <section class="page-hero" style="padding: 110px 20px 28px;">
      <div class="hero-inner" style="max-width: 1120px; margin: 0 auto;">
        <h1>Fun Tools</h1>
        <p>Discover UI kits, design inspiration resources, and developer utilities in one place.</p>
        <div id="searchbar" style="margin-top: 24px;">
          <i class="fa-solid fa-magnifying-glass" aria-hidden="true" style="color:#9bc3e3;"></i>
          <label for="search-input">Search</label>
          <input type="search" id="search-input" placeholder="Search component library, asset, or utility..." aria-label="Search for resources" />
        </div>
      </div>
    </section>

    <section class="content-section" style="margin-top: 24px;">
      <div class="section-bar">
        <div class="tabs">
          <button class="tab active" type="button">All</button>
          <button class="tab" type="button">UI Components</button>
          <button class="tab" type="button">Creative Kits</button>
          <button class="tab" type="button">Developer Utilities</button>
        </div>
      </div>

      <div id="no-results" style="display:none;text-align:center;color:#fff;margin:10px 0;">No resources found.</div>

      <section class="tools-section" style="margin-top: 20px;">
        <div id="tools-container" data-page="fun-tools"></div>
      </section>
    </section>
  </main>

  <script type="module" src="../../js/script.js"></script>
  <script type="module" src="../../js/search.js"></script>
  <script type="module" src="../../js/links.js"></script>
</body>
</html>
