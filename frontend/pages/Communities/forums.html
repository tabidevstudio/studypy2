<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-
                    scale=1.0">
        <title>Forums | Studypy</title>
        <link rel="stylesheet" href="../../css/main.css">
        <link rel="stylesheet" href="../../css/communities.css">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap">
        <link rel="icon" type="image/png" href="../../assets/favicon/favicon-96x96.png" sizes="96x96" />
        <style>
            .modal-overlay{position:fixed;inset:0;background:rgba(8,12,28,0.85);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
            .modal-overlay.active{opacity:1;pointer-events:auto}
            .modal-card{background:rgba(22,23,27,.98);border-radius:12px;padding:18px;max-width:640px;width:92%;box-shadow:0 10px 30px rgba(0,0,0,.5)}
            .modal-close-btn{position:absolute;right:14px;top:10px;background:transparent;border:none;color:rgba(255,255,255,.6);font-size:28px;cursor:pointer}
            .modal-body{color:#fff}

            /* Forum App Spacing & Styling */
            .forum-app {
                max-width: 850px;
                margin: 0 auto;
                display: flex;
                flex-direction: column;
                gap: 24px;
            }
            .new-post {
                background: rgba(28, 29, 34, 0.65);
                border: 1px solid rgba(255, 255, 255, 0.08);
                border-radius: 12px;
                padding: 20px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
                backdrop-filter: blur(10px);
            }
            #forum-form {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }
            #forum-form input[type="text"],
            #forum-form textarea {
                background: rgba(22, 23, 27, 0.6);
                border: 1px solid rgba(255, 255, 255, 0.12);
                border-radius: 8px;
                padding: 12px 16px;
                color: #fff;
                font-family: inherit;
                font-size: 0.95rem;
                transition: border-color 0.25s, box-shadow 0.25s;
            }
            #forum-form input[type="text"]:focus,
            #forum-form textarea:focus {
                border-color: #149CEA;
                box-shadow: 0 0 0 3px rgba(20, 156, 234, 0.18);
                outline: none;
            }
            #forum-form textarea {
                min-height: 100px;
                resize: vertical;
            }
            #forum-form button[type="submit"] {
                align-self: flex-end;
                background: #149CEA;
                color: #fff;
                border: none;
                border-radius: 8px;
                padding: 10px 24px;
                font-weight: 600;
                cursor: pointer;
                transition: background 0.2s, transform 0.2s;
            }
            #forum-form button[type="submit"]:hover {
                background: #1185c8;
                transform: translateY(-1px);
            }
            .forum-list {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }
            .forum-post {
                background: rgba(28, 29, 34, 0.65);
                border: 1px solid rgba(255, 255, 255, 0.08);
                border-radius: 12px;
                padding: 24px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
                backdrop-filter: blur(10px);
                display: flex;
                flex-direction: column;
                gap: 12px;
                text-align: left;
            }
            .forum-post h3 {
                margin: 0;
                font-size: 1.3rem;
                color: #fff;
                font-weight: 600;
            }
            .forum-post .meta {
                font-size: 0.8rem;
                color: rgba(255, 255, 255, 0.55);
            }
            .forum-post p {
                margin: 4px 0 12px 0;
                color: rgba(255, 255, 255, 0.85);
                line-height: 1.6;
                font-size: 0.95rem;
                white-space: pre-wrap;
            }
            .forum-post .replies {
                border-top: 1px solid rgba(255, 255, 255, 0.08);
                padding-top: 16px;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .forum-post .reply {
                background: rgba(22, 23, 27, 0.45);
                padding: 10px 14px;
                border-radius: 8px;
                border: 1px solid rgba(255, 255, 255, 0.04);
                color: rgba(255, 255, 255, 0.8);
                font-size: 0.9rem;
                line-height: 1.5;
            }
            .forum-post .reply-form {
                display: flex;
                gap: 10px;
                margin-top: 12px;
            }
            .forum-post .reply-form input {
                flex: 1;
                background: rgba(22, 23, 27, 0.6);
                border: 1px solid rgba(255, 255, 255, 0.12);
                border-radius: 8px;
                padding: 10px 14px;
                color: #fff;
                font-family: inherit;
                font-size: 0.9rem;
            }
            .forum-post .reply-form input:focus {
                border-color: #149CEA;
                outline: none;
            }
            .forum-post .reply-form button {
                background: transparent;
                border: 1px solid #149CEA;
                color: #149CEA;
                border-radius: 8px;
                padding: 10px 20px;
                font-weight: 600;
                cursor: pointer;
                transition: background 0.2s, color 0.2s;
            }
            .forum-post .reply-form button:hover {
                background: #149CEA;
                color: #fff;
            }
        </style>
    </head>
    <body>
        <div id="navbar-placeholder"></div>

        <main class="main">
            <div class="community-page">
                <div class="community-badge">
                    <i class='bx bx-conversation'></i> Community Space
                </div>
                <h1 class="community-title">Discussion Forums</h1>
                <p class="community-subtitle">Connect with other students, ask questions, share answers, and collaborate on projects.</p>

                <div id="forum-app" class="forum-app">
                    <section class="new-post">
                        <form id="forum-form">
                            <input type="text" name="title" placeholder="Post title" required />
                            <textarea name="content" placeholder="Write your post..." required></textarea>
                            <button type="submit">Create Post</button>
                        </form>
                    </section>

                    <section id="forum-list" class="forum-list">Loading...</section>
                </div>
            </div>
        </main>

        <!-- Login modal for unauthenticated users -->
        <div id="loginModal" class="modal-overlay">
            <div class="modal-card">
                <button class="modal-close-btn" id="loginModalClose" aria-label="Close modal">&times;</button>
                <div class="modal-body" style="max-width:520px; padding:30px;">
                    <h2 style="margin-top:0;">Log in to post</h2>
                    <p>You can view posts without an account. Please log in to create posts or replies.</p>
                    <div style="margin-top:20px; display:flex; gap:12px;">
                        <a href="../login.html" class="button" style="text-decoration:none; padding:10px 16px;">Log in</a>
                        <button id="loginModalCloseBtn" class="button transparent">Continue browsing</button>
                    </div>
                </div>
            </div>
        </div>
        <script type="module" src="../../js/forum.js"></script>
        <script type="module" src="../../js/script.js"></script>
    </body>
</html>
