<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discord Servers | Studypy</title>
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../css/communities.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap">
    <link rel="icon" type="image/png" href="../../assets/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="../../assets/favicon/favicon.svg" />
    <link rel="shortcut icon" href="../../assets/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../../assets/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="StudyPY" />
    <link rel="manifest" href="../../assets/favicon/site.webmanifest" />
    <style>
        /* ── Modal Overlay Backdrop ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(8, 12, 28, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* ── Modal Content Card ── */
        .modal-card {
            background: rgba(22, 23, 27, 0.95);
            border: 1px solid rgba(145, 218, 235, 0.25);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(20, 156, 234, 0.15);
            border-radius: 20px;
            width: 90%;
            max-width: 680px;
            position: relative;
            transform: translateY(30px);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
        }

        .modal-overlay.active .modal-card {
            transform: translateY(0);
        }

        /* ── Close Button ── */
        .modal-close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 32px;
            cursor: pointer;
            line-height: 1;
            z-index: 1010;
            transition: color 0.2s, transform 0.2s;
        }

        .modal-close-btn:hover {
            color: #91daeb;
            transform: scale(1.15);
        }

        /* ── Modal Body ── */
        .modal-body {
            padding: 40px 15px 15px 15px;
            height: 600px;
            display: flex;
            flex-direction: column;
        }

        .modal-body iframe {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            border: none;
        }
    </style>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <main class="MainDiscordServers">
        <h1>Community <strong>Discord</strong> Servers</h1>
        <div class="TabDiscordServers">
            
            <div class="TabServers">
                <div class="Cover">
                <img src="../../assets/images/PhiCSS-logo.jpg">
                <h1>Phicss</h1>
                </div>

                <div>
                <h3>PHICSS</h3>
                <p>PHICSS-WMSU is an official JPCS chapter for computing and IT students at WMSU-CCS.</p>
                </div>
                <a href="https://discord.gg/yeHwmGBvrk" target="_blank" rel="noopener noreferrer"><button>Join Now</button></a>
            </div>

            <div class="TabServers">
                <div class="Cover">
                <img src="../../assets/images/lugu-bg.png">
                <h1>Tabi404</h1>
                </div>

                <div>
                <h3>Tabi404</h3>
                <p>Where Coders Hangout, Talk and share their knowledge.</p>
                </div>
                <a href="https://discord.gg/5pxcw7RdWP" target="_blank" rel="noopener noreferrer"><button>Join Now</button></a>
            </div>

        </div>

        <button id="AddDiscordBtn">Add your Own Server</button>
    </main>

    <!-- Modal for Adding Discord Server -->
    <div id="discordFormModal" class="modal-overlay">
        <div class="modal-card">
            <button class="modal-close-btn" id="closeModalBtn" aria-label="Close modal">&times;</button>
            <div class="modal-body">
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe2NA9WoTWQb0GHQi8oqKbO5ZFN57rEWml5WhDU49a8n1J_YQ/viewform?embedded=true" width="100%" height="100%" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
            </div>
        </div>
    </div>

    <script type="module" src="../../js/script.js"></script>
    <script type="module">
        const addBtn = document.getElementById('AddDiscordBtn');
        const modal = document.getElementById('discordFormModal');
        const closeBtn = document.getElementById('closeModalBtn');

        if (addBtn && modal && closeBtn) {
            addBtn.addEventListener('click', () => {
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            });

            const closeModal = () => {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            };

            closeBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeModal();
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.classList.contains('active')) {
                    closeModal();
                }
            });
        }
    </script>
</body>
</html>
