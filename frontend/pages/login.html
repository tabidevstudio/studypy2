<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Studypy</title>
    <link rel="stylesheet" href="../css/main.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap">
    <link rel="icon" type="image/png" href="../assets/favicon/favicon-96x96.png" sizes="96x96" />
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
            background: #16171B;
        }

        .login-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(12, 78, 139, 0.45) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(35, 76, 114, 0.35) 0%, transparent 50%);
            pointer-events: none;
        }

        .login-card {
            position: relative;
            z-index: 2;
            background: rgba(30, 32, 38, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 45px 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            text-decoration: none;
        }

        .login-logo img {
            width: 45px;
            height: 45px;
            object-fit: contain;
        }

        .login-logo-text {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .login-logo-text span {
            color: rgb(145, 218, 235);
        }

        .login-title {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-family: 'Poppins', sans-serif;
            font-size: 0.88rem;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.5;
            margin-bottom: 35px;
        }

        .btn-oauth {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-google {
            background: rgba(219, 68, 85, 0.15);
            border-color: rgba(219, 68, 85, 0.25);
        }

        .btn-google:hover {
            background: rgba(219, 68, 85, 0.3);
            border-color: rgba(219, 68, 85, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(219, 68, 85, 0.2);
        }

        .btn-github {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .btn-github:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.1);
        }

        .btn-oauth i {
            font-size: 1.35rem;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            margin: 30px 0;
            position: relative;
        }

        .developer-notice {
            background: rgba(145, 218, 235, 0.06);
            border: 1px dashed rgba(145, 218, 235, 0.2);
            border-radius: 10px;
            padding: 15px;
            font-size: 0.78rem;
            color: rgba(145, 218, 235, 0.8);
            line-height: 1.5;
            text-align: left;
        }

        .developer-notice i {
            font-size: 1rem;
            margin-right: 4px;
            vertical-align: middle;
        }

        .error-message {
            background: rgba(235, 94, 85, 0.1);
            border: 1px solid rgba(235, 94, 85, 0.2);
            color: #eb5e55;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            text-align: left;
        }
    </style>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <a href="/" class="login-logo">
                <img src="/assets/images/lugu-bg.png" alt="StudyPy">
                <div class="login-logo-text">Study<span>Py</span></div>
            </a>

            <h1 class="login-title">Welcome to StudyPy</h1>
            <p class="login-subtitle">Login Kana Bhie!</p>

            <div id="error-box" class="error-message"></div>

            <a href="#" id="google-login-btn" class="btn-oauth btn-google">
                <i class='bx bxl-google'></i>
                Continue with Google
            </a>

            <a href="#" id="github-login-btn" class="btn-oauth btn-github">
                <i class='bx bxl-github'></i>
                Continue with GitHub
            </a>

        </div>
    </div>

    <script type="module">
        import { getProfile } from "../js/auth.js";

        // Setup dynamic OAuth URLs
        const BACKEND_BASE = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
            ? "http://localhost:3000"
            : "https://studypy-backend.onrender.com";

        document.getElementById("google-login-btn").href = `${BACKEND_BASE}/api/auth/google`;
        document.getElementById("github-login-btn").href = `${BACKEND_BASE}/api/auth/github`;

        // If user is already logged in, redirect them to settings page
        getProfile().then(res => {
            if (res.authenticated) {
                window.location.href = "/pages/settings.html";
            }
        });

        // Parse query params for errors
        const params = new URLSearchParams(window.location.search);
        const error = params.get("error");
        if (error) {
            const errorBox = document.getElementById("error-box");
            errorBox.style.display = "block";
            
            let message = "Authentication failed. Please try again.";
            if (error === "token_exchange_failed") message = "Failed to secure access token from OAuth provider.";
            if (error === "profile_fetch_failed") message = "Failed to fetch profile details from OAuth provider.";
            if (error === "no_email_provided") message = "OAuth provider did not supply an email address.";
            if (error === "no_code") message = "No authorization code returned from provider.";
            
            errorBox.innerHTML = `<i class='bx bx-error-alt' style='vertical-align:middle; margin-right:6px;'></i>${message}`;
        }
    </script>
</body>
</html>
