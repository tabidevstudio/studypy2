<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Studypy</title>
    <link rel="stylesheet" href="../css/main.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap">
    <link rel="icon" type="image/png" href="../assets/favicon/favicon-96x96.png" sizes="96x96" />
</head>
<body>

    <div id="navbar-placeholder"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <a href="/" class="login-logo">
                <img src="/assets/images/lugu-bg.png" alt="StudyPy">
                <div class="login-logo-text">Study<span>Py</span></div>
            </a>

            <h1 class="login-title">Welcome to StudyPy</h1>
            <p class="login-subtitle">Login Kana Bhie!</p>

            <div id="error-box" class="error-message"></div>

            <a href="#" id="google-login-btn" class="btn-oauth btn-google">
                <i class='bx bxl-google'></i>
                Continue with Google
            </a>

            <a href="#" id="github-login-btn" class="btn-oauth btn-github">
                <i class='bx bxl-github'></i>
                Continue with GitHub
            </a>

        </div>
    </div>

    <script type="module">
        import { getProfile } from "../js/auth.js";

        // Setup OAuth URLs
        const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
        const BACKEND_BASE = isLocal
            ? "http://localhost:3000"
            : "";

        document.getElementById("google-login-btn").href = `${BACKEND_BASE}/api/auth/google`;
        document.getElementById("github-login-btn").href = `${BACKEND_BASE}/api/auth/github`;

        // If user is already logged in, redirect them to settings page
        getProfile().then(res => {
            if (res.authenticated) {
                window.location.href = "/pages/settings.html";
            }
        });

        // Parse query params for errors
        const params = new URLSearchParams(window.location.search);
        const error = params.get("error");
        if (error) {
            const errorBox = document.getElementById("error-box");
            errorBox.style.display = "block";
            
            let message = "Authentication failed. Please try again.";
            if (error === "token_exchange_failed") message = "Failed to secure access token from OAuth provider.";
            if (error === "profile_fetch_failed") message = "Failed to fetch profile details from OAuth provider.";
            if (error === "no_email_provided") message = "OAuth provider did not supply an email address.";
            if (error === "no_code") message = "No authorization code returned from provider.";
            
            errorBox.innerHTML = `<i class='bx bx-error-alt' style='vertical-align:middle; margin-right:6px;'></i>${message}`;
        }
    </script>
</body>
</html>
