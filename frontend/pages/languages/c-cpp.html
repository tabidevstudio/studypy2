<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>503 - Under Construction | Studypy</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../compiler.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap">
</head>
<body>

    <div id="navbar-placeholder"></div>

    <main class="main">
        <div class="uc-wrapper">

            <i class='bx bx-cog uc-gear uc-gear-1'></i>
            <i class='bx bx-cog uc-gear uc-gear-2'></i>
            <i class='bx bx-cog uc-gear uc-gear-3'></i>

            <div class="uc-card">

                <div class="uc-badge">
                    <span class="uc-badge-dot"></span>
                    Service Unavailable
                </div>

                <div class="uc-code">503</div>
                <div class="uc-divider"></div>

                <h1 class="uc-title">Under <span>Construction</span></h1>

                <p class="uc-sub">This page is still being built. We're working hard to bring it to life — check back soon!</p>
                <p class="uc-thanks">Thank you for your Support &#9825;</p>

                <div class="uc-progress-wrap">
                    <div class="uc-progress-label">
                        <span>In Progress</span>
                        <span>Coming Soon</span>
                    </div>
                    <div class="uc-progress-track">
                        <div class="uc-progress-bar"></div>
                    </div>
                </div>

                <a href="/index.html" class="uc-btn">
                    <i class='bx bx-arrow-back'></i>
                    Go Back
                </a>
            </div>
        </div>
        <section>
            <div id="examples-panel"></div>
            <div class="sp-compiler" id="compiler-cpp">
                <div class="sp-compiler__header">
                    <div class="sp-compiler__lang-badge">
                    <span class="dot"></span>
                    C++ — G++ 15
                    </div>
                    <div class="sp-compiler__actions">
                    <button class="sp-btn-clear">Clear</button>
                    <button class="sp-btn-run">
                        <svg viewBox="0 0 16 16"><path d="M3 2l10 6-10 6V2z"/></svg>
                        Run
                    </button>
                    </div>
                </div>
                
                <div class="sp-compiler__editor-wrap">
                    <textarea class="sp-compiler__textarea" spellcheck="false"></textarea>
                </div>
                
                <div class="sp-compiler__stdin-wrap">
                    <div class="sp-compiler__stdin-label">stdin (optional input)</div>
                    <textarea class="sp-compiler__stdin" placeholder="e.g. 42" rows="2"></textarea>
                </div>
                
                <div class="sp-compiler__output-wrap">
                    <div class="sp-compiler__output-header">
                    <div class="sp-compiler__output-label">
                        <span class="sp-output-dot"></span>
                        Output
                    </div>
                    <div class="sp-compiler__stats">
                        <span class="sp-stat-time"></span>
                        <span class="sp-stat-mem"></span>
                    </div>
                    </div>
                    <pre class="sp-compiler__output is-empty">Output will appear here...</pre>
                </div>
            </div>
        </section>
    </main>
    <script src="../../compiler.js"></script>
    <script src="../../script.js"></script>
    <script src="../../examples.js"></script>
    <script>
        initCompiler({
        containerId: 'compiler-cpp',
        language: 'g++-15',
        label: 'C++',
        placeholder: '#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << "Hello from StudyPY!" << endl;\n    return 0;\n}',
        });

        initExamples('examples-panel', 'cpp');
    </script>
</body>
</html>
